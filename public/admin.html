<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리 · eduPLAY</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f6f4;--surface:#fff;--surface2:#f2f2f0;--surface3:#ebebea;
  --border:#e3e3e0;--border2:#d4d4d0;
  --text:#1a1a18;--text2:#6b6b66;--text3:#a8a8a3;
  --accent:#2060e8;--accent-bg:#eff4ff;
  --green:#16a34a;--green-bg:#f0fdf4;
  --red:#dc2626;--amber:#d97706;
  --topbar-h:50px;--tree-w:272px;--r:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}

/* TOPBAR */
.topbar{height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:200}
.t-logo{font-weight:600;font-size:15px;letter-spacing:-.3px;user-select:none;white-space:nowrap}
.t-logo span{color:var(--text3);font-weight:400}
.t-badge{font-size:10px;font-weight:600;background:var(--amber);color:#fff;padding:2px 7px;border-radius:4px;letter-spacing:.3px}
.t-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.save-ind{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px;font-weight:500}
.save-ind.saving{color:var(--amber)}.save-ind.saved{color:var(--green)}.save-ind.dirty{color:var(--red)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;transition:background .12s,color .12s,border-color .12s;border:1px solid transparent;white-space:nowrap;line-height:1}
.btn-ghost{background:transparent;border-color:var(--border);color:var(--text2)}.btn-ghost:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.btn-solid{background:var(--accent);color:#fff}.btn-solid:hover{opacity:.88}
.btn-danger{background:transparent;border-color:#fecaca;color:var(--red)}.btn-danger:hover{background:#fef2f2}
.btn-sm{padding:4px 9px;font-size:12px}.btn-xs{padding:3px 7px;font-size:11px}
.btn-ico{padding:6px;border-radius:6px;background:transparent;border:none;color:var(--text2);cursor:pointer;transition:background .12s,color .12s;display:inline-flex;align-items:center;justify-content:content:center;flex-shrink:0}
.btn-ico:hover{background:var(--surface2);color:var(--text)}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - var(--topbar-h))}

/* TREE PANEL */
.tree-panel{width:var(--tree-w);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-hd{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.panel-hd h3{font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--text3)}
.tree-scroll{flex:1;overflow-y:auto;padding:4px 0 16px}
.tree-scroll::-webkit-scrollbar{width:0}.tree-scroll:hover::-webkit-scrollbar{width:4px}
.tree-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* TREE NODES */
.t-cat-hd{display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;user-select:none;transition:background .1s}
.t-cat-hd:hover,.t-sub-hd:hover,.t-vid:hover{background:var(--surface2)}
.t-chv{color:var(--text3);transition:transform .18s;flex-shrink:0;display:flex}
.t-cat.open .t-cat-hd .t-chv,.t-sub.open .t-sub-hd .t-chv{transform:rotate(90deg)}
.t-cat-num{width:18px;height:18px;border-radius:4px;flex-shrink:0;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.t-cat-lbl{flex:1;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-bdg{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;background:var(--surface2);padding:1px 5px;border-radius:4px;flex-shrink:0}
.t-cat-body{display:none}.t-cat.open .t-cat-body{display:block}
.t-sub-hd{display:flex;align-items:center;gap:7px;padding:5px 14px 5px 30px;cursor:pointer;user-select:none;transition:background .1s}
.t-sub-lbl{flex:1;font-size:12.5px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-sub-body{display:none}.t-sub.open .t-sub-body{display:block}
.t-vid{display:flex;align-items:center;gap:7px;padding:5px 14px 5px 46px;cursor:pointer;transition:background .1s;position:relative}
.t-vid:hover{background:var(--surface2)}.t-vid.sel{background:var(--accent-bg)}
.t-vid.sel .t-vid-tit{color:var(--accent);font-weight:500}
.t-vid.sel::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:2px;background:var(--accent);border-radius:0 2px 2px 0}
.t-dot{width:5px;height:5px;border-radius:50%;background:var(--border2);flex-shrink:0}
.t-vid.sel .t-dot{background:var(--accent)}
.t-vid-tit{font-size:12.5px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* DETAIL */
.detail{flex:1;overflow-y:auto;padding:24px 28px;background:var(--bg)}
.detail::-webkit-scrollbar{width:4px}
.detail::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--text3)}
.ei-ico{color:var(--border2)}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:16px;overflow:hidden}
.card-hd{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.card-hd h4{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);flex:1}
.card-body{padding:16px;display:flex;flex-direction:column;gap:12px}

/* FORM */
.field{display:flex;flex-direction:column;gap:5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px}
.input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 11px;font-size:13px;color:var(--text);font-family:inherit;outline:none;transition:border-color .15s;width:100%}
.input:focus{border-color:var(--accent);background:var(--surface)}.input::placeholder{color:var(--text3)}
.input-mono{font-family:'DM Mono',monospace;font-size:12px}
textarea.input{resize:vertical;min-height:65px;line-height:1.6}
.row-btn{display:flex;gap:6px}.row-btn .input{flex:1}
.hint{font-size:11px;color:var(--text3);margin-top:4px;line-height:1.6}
.hint code{color:var(--accent);font-family:'DM Mono',monospace;font-size:11px}

/* COLOR + ICON */
.color-row{display:flex;align-items:center;gap:10px}
.color-row input[type=color]{width:34px;height:34px;padding:2px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);cursor:pointer}
.icon-grid{display:flex;flex-wrap:wrap;gap:5px}
.icon-opt{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .1s}
.icon-opt:hover,.icon-opt.sel{border-color:var(--accent);background:var(--accent-bg)}

/* PDF ROWS */
.pdf-rows{display:flex;flex-direction:column;gap:8px}
.pdf-row{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.pdf-row-hd{display:flex;align-items:center;gap:8px}
.pdf-num{width:20px;height:20px;border-radius:4px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text3);font-family:'DM Mono',monospace;flex-shrink:0}
.tr-row{display:flex;align-items:center;gap:8px}
.tr-row .input{width:86px;text-align:center}
.tr-sep{font-size:11px;color:var(--text3);flex-shrink:0}
.add-row{border:1px dashed var(--border);border-radius:var(--r);padding:10px;text-align:center;color:var(--text3);font-size:12px;cursor:pointer;transition:all .15s}
.add-row:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}

/* DANGER */
.card.danger{border-color:#fecaca}
.card.danger .card-hd{background:#fef2f2}
.card.danger .card-hd h4{color:var(--red)}

/* BC */
.bc{display:flex;align-items:center;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.bc-link{color:var(--accent);cursor:pointer;font-size:13px;font-weight:500}.bc-link:hover{text-decoration:underline}
.bc span{font-size:13px;color:var(--text3)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:440px;max-width:92vw;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.12);animation:mIn .16s ease}
.modal.wide{width:560px}
@keyframes mIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.mo-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.mo-tit{font-size:14px;font-weight:600;flex:1}
.mo-body{padding:16px 18px;display:flex;flex-direction:column;gap:10px;max-height:65vh;overflow-y:auto}
.mo-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.btn-ico{padding:6px;border-radius:6px;background:transparent;border:none;color:var(--text2);cursor:pointer;transition:background .12s,color .12s;display:inline-flex;align-items:center;justify-content:center}
.btn-ico:hover{background:var(--surface2);color:var(--text)}

/* FILE LIST */
.file-list{display:flex;flex-direction:column;gap:5px;max-height:280px;overflow-y:auto}
.file-row{display:flex;align-items:center;gap:10px;padding:8px 11px;border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .12s;background:var(--surface2)}
.file-row:hover{border-color:var(--accent);background:var(--accent-bg)}
.file-row.sel{border-color:var(--accent);background:var(--accent-bg)}
.file-name{flex:1;font-size:12px;font-family:'DM Mono',monospace;color:var(--text)}
.file-path{font-size:10px;color:var(--text3);margin-top:2px}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--text);color:#fff;border-radius:8px;padding:9px 16px;font-size:13px;z-index:9999;transition:transform .22s ease;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="topbar">
  <div class="t-logo">edu<span>PLAY</span></div>
  <span class="t-badge">ADMIN</span>
  <div class="save-ind" id="saveInd"><span id="saveTx">저장됨</span></div>
  <div class="t-right">
    <button class="btn btn-ghost" onclick="window.open('/player.html','_blank')">플레이어</button>
    <button class="btn btn-solid" onclick="saveAll()">저장</button>
    <button class="btn btn-ghost" onclick="logout()">로그아웃</button>
  </div>
</div>

<div class="layout">
  <div class="tree-panel">
    <div class="panel-hd">
      <h3>강의 목록</h3>
      <button class="btn btn-solid btn-sm" onclick="addCat()">+ 대분류</button>
    </div>
    <div class="tree-scroll" id="treeRoot"></div>
  </div>
  <div class="detail" id="detail">
    <div class="empty-state">
      <div class="ei-ico"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width=".8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></div>
      <p style="font-size:13px">항목을 선택하거나 대분류를 추가하세요</p>
    </div>
  </div>
</div>

<!-- ADD CAT -->
<div class="overlay" id="moCat" onclick="bgClose(event,'moCat')">
  <div class="modal">
    <div class="mo-hd"><div class="mo-tit">대분류 추가</div><button class="btn-ico" onclick="cm('moCat')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="mo-body">
      <div class="field"><label>이름</label><input class="input" id="catName" placeholder="예: 1. Python 기초"></div>
      <div class="field"><label>아이콘</label><div class="icon-grid" id="catIG"></div></div>
      <div class="field"><label>색상</label><div class="color-row"><input type="color" id="catColor" value="#2060e8"><span style="font-size:12px;color:var(--text3)">아이콘 배경색</span></div></div>
    </div>
    <div class="mo-foot"><button class="btn btn-ghost" onclick="cm('moCat')">취소</button><button class="btn btn-solid" onclick="saveCatM()">추가</button></div>
  </div>
</div>

<!-- ADD SUB -->
<div class="overlay" id="moSub" onclick="bgClose(event,'moSub')">
  <div class="modal">
    <div class="mo-hd"><div class="mo-tit">소분류 추가</div><button class="btn-ico" onclick="cm('moSub')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="mo-body"><div class="field"><label>이름</label><input class="input" id="subName" placeholder="예: 1-1. 환경 설정"></div></div>
    <div class="mo-foot"><button class="btn btn-ghost" onclick="cm('moSub')">취소</button><button class="btn btn-solid" onclick="saveSubM()">추가</button></div>
  </div>
</div>

<!-- CONFIRM -->
<div class="overlay" id="moConfirm" onclick="bgClose(event,'moConfirm')">
  <div class="modal">
    <div class="mo-hd"><div class="mo-tit">삭제 확인</div><button class="btn-ico" onclick="cm('moConfirm')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="mo-body"><div style="font-size:13px;color:var(--text2);line-height:1.6" id="confirmMsg"></div></div>
    <div class="mo-foot"><button class="btn btn-ghost" onclick="cm('moConfirm')">취소</button><button class="btn btn-danger" onclick="_cf()">삭제</button></div>
  </div>
</div>

<!-- FILE PICKER -->
<div class="overlay" id="moFile" onclick="bgClose(event,'moFile')">
  <div class="modal wide">
    <div class="mo-hd"><div class="mo-tit" id="moFileTit">파일 선택</div><button class="btn-ico" onclick="cm('moFile')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="mo-body">
      <div style="font-size:12px;color:var(--text3)" id="moFileHint"></div>
      <div class="file-list" id="fileList"></div>
      <div class="hint">파일이 없으면 서버의 <code>public/videos/</code> 또는 <code>public/pdfs/</code> 폴더에 넣으세요.</div>
    </div>
    <div class="mo-foot"><button class="btn btn-ghost" onclick="cm('moFile')">취소</button><button class="btn btn-solid" onclick="confirmPick()">선택</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ICONS=['🐍','⚡','🔷','📦','🧮','🔬','🌐','🎨','🔧','📊','🏗️','🧩','🚀','💡','🔐','📡','🧠','🎯','🌿','⚙️','📚','🎓','🎵','🖥️','🔑'];
const CHV=`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;
const X_ICO=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;

let TOKEN=sessionStorage.getItem('adminToken')||new URLSearchParams(location.search).get('token')||'';
let data=[],sel=null,ctx={},_cf=()=>{},openNodes=new Set(),dirty=false,_pt=null,_ps=null;

async function checkAuth(){if(!TOKEN){location.href='/login.html';return false;}const r=await fetch('/api/auth/check',{headers:{'x-admin-token':TOKEN}});const d=await r.json();if(!d.valid){location.href='/login.html';return false;}return true;}
async function logout(){await fetch('/api/auth/logout',{method:'POST',headers:{'x-admin-token':TOKEN}});sessionStorage.removeItem('adminToken');location.href='/login.html';}
async function af(url,opts={}){const h={'Content-Type':'application/json','x-admin-token':TOKEN,...(opts.headers||{})};const r=await fetch(url,{...opts,headers:h});if(r.status===401){location.href='/login.html';throw new Error('auth');}return r.json();}

async function loadData(){data=await af('/api/courses');renderTree();}
async function saveAll(){setSave('saving');await af('/api/courses',{method:'POST',body:JSON.stringify(data)});setSave('saved');dirty=false;toast('서버에 저장됐습니다');}
function markDirty(){dirty=true;setSave('dirty');}
function setSave(s){const el=document.getElementById('saveInd'),tx=document.getElementById('saveTx');el.className='save-ind '+s;tx.textContent=s==='saving'?'저장 중...':s==='saved'?'저장됨':'저장되지 않음';}

function renderTree(){
  const root=document.getElementById('treeRoot');root.innerHTML='';
  if(!data.length){root.innerHTML=`<div style="padding:18px 16px;font-size:13px;color:var(--text3)">대분류를 추가하세요</div>`;return;}
  data.forEach(c=>root.appendChild(mkCat(c)));
  openNodes.forEach(id=>{const n=document.getElementById('tn-'+id);if(n)n.classList.add('open');});
}
function mkCat(cat){
  const tot=cat.subcategories.reduce((a,s)=>a+s.videos.length,0);
  const d=document.createElement('div');d.className='t-cat'+(openNodes.has(cat.id)?' open':'');d.id='tn-'+cat.id;
  d.innerHTML=`<div class="t-cat-hd" onclick="toggleNode('${cat.id}');selCat('${cat.id}')"><span class="t-chv">${CHV}</span><span class="t-cat-num" style="background:${cat.color}18;color:${cat.color}">${(cat.label.match(/\d+/)||['·'])[0]}</span><span class="t-cat-lbl">${cat.label}</span><span class="t-bdg">${tot}</span></div><div class="t-cat-body"></div>`;
  cat.subcategories.forEach(s=>d.querySelector('.t-cat-body').appendChild(mkSub(cat.id,s)));
  return d;
}
function mkSub(cid,sub){
  const d=document.createElement('div');d.className='t-sub'+(openNodes.has(sub.id)?' open':'');d.id='tn-'+sub.id;
  d.innerHTML=`<div class="t-sub-hd" onclick="toggleNode('${sub.id}');selSub('${cid}','${sub.id}')"><span class="t-chv">${CHV}</span><span class="t-sub-lbl">${sub.label}</span><span class="t-bdg">${sub.videos.length}</span></div><div class="t-sub-body"></div>`;
  sub.videos.forEach(v=>d.querySelector('.t-sub-body').appendChild(mkVid(cid,sub.id,v)));
  return d;
}
function mkVid(cid,sid,vid){
  const el=document.createElement('div');el.className='t-vid'+(sel?.vidId===vid.id?' sel':'');el.id='tn-'+vid.id;
  el.innerHTML=`<div class="t-dot"></div><div class="t-vid-tit">${vid.title}</div>`;
  el.onclick=()=>selVid(cid,sid,vid.id);return el;
}
function toggleNode(id){if(openNodes.has(id))openNodes.delete(id);else openNodes.add(id);document.getElementById('tn-'+id)?.classList.toggle('open',openNodes.has(id));}
function updSel(){document.querySelectorAll('.t-vid').forEach(e=>e.classList.remove('sel'));if(sel?.type==='vid')document.getElementById('tn-'+sel.vidId)?.classList.add('sel');}

function fc(id){return data.find(c=>c.id===id);}
function fs(cid,sid){return fc(cid)?.subcategories.find(s=>s.id===sid);}
function fv(cid,sid,vid){return fs(cid,sid)?.videos.find(v=>v.id===vid);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function selCat(id){sel={type:'cat',catId:id};updSel();showCat(fc(id));}
function selSub(cid,sid){sel={type:'sub',catId:cid,subId:sid};updSel();showSub(fc(cid),fs(cid,sid));}
function selVid(cid,sid,vid){sel={type:'vid',catId:cid,subId:sid,vidId:vid};updSel();showVid(fc(cid),fs(cid,sid),fv(cid,sid,vid));}

function showCat(cat){
  document.getElementById('detail').innerHTML=`
    <div class="bc"><b style="font-size:13px">대분류 편집</b></div>
    <div class="card"><div class="card-hd"><h4>기본 정보</h4><button class="btn btn-ghost btn-sm" onclick="addSub('${cat.id}')">+ 소분류</button></div>
    <div class="card-body">
      <div class="field"><label>이름</label><input class="input" id="dc_l" value="${esc(cat.label)}" oninput="markDirty()"></div>
      <div class="grid2">
        <div class="field"><label>아이콘</label><div class="icon-grid" id="dc_ig"></div><input class="input input-mono" id="dc_i" value="${cat.icon}" style="margin-top:6px" oninput="markDirty()"></div>
        <div class="field"><label>색상</label><div class="color-row"><input type="color" id="dc_c" value="${cat.color}" oninput="markDirty()"></div></div>
      </div>
      <div style="display:flex;justify-content:flex-end"><button class="btn btn-solid" onclick="saveCatI('${cat.id}')">적용</button></div>
    </div></div>
    <div class="card danger"><div class="card-hd"><h4>위험 구역</h4></div><div class="card-body">
      <p style="font-size:13px;color:var(--text2)">이 대분류와 모든 하위 강의를 삭제합니다.</p>
      <button class="btn btn-danger" onclick="delCat('${cat.id}')">대분류 삭제</button>
    </div></div>`;
  buildIG('dc_ig',cat.icon,ic=>{document.getElementById('dc_i').value=ic;markDirty();});
}
function saveCatI(id){const c=fc(id);c.label=document.getElementById('dc_l').value.trim()||c.label;c.icon=document.getElementById('dc_i').value||c.icon;c.color=document.getElementById('dc_c').value;markDirty();renderTree();updSel();toast('적용됐습니다. 저장 버튼으로 서버에 반영하세요.');}
function delCat(id){const c=fc(id);confirm2(`<b style="color:var(--text)">${c.label}</b> 대분류와 모든 하위 항목을 삭제하시겠습니까?`,()=>{data=data.filter(x=>x.id!==id);sel=null;markDirty();renderTree();document.getElementById('detail').innerHTML=`<div class="empty-state"><div class="ei-ico"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width=".8" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></div><p style="font-size:13px">항목을 선택하세요</p></div>`;toast('삭제됐습니다');});}

function showSub(cat,sub){
  document.getElementById('detail').innerHTML=`
    <div class="bc"><span class="bc-link" onclick="selCat('${cat.id}')">${cat.label}</span><span>›</span><b style="font-size:13px">${sub.label}</b></div>
    <div class="card"><div class="card-hd"><h4>기본 정보</h4><button class="btn btn-ghost btn-sm" onclick="addVid('${cat.id}','${sub.id}')">+ 강의</button></div>
    <div class="card-body">
      <div class="field"><label>이름</label><input class="input" id="ds_l" value="${esc(sub.label)}" oninput="markDirty()"></div>
      <div style="display:flex;justify-content:flex-end"><button class="btn btn-solid" onclick="saveSubI('${cat.id}','${sub.id}')">적용</button></div>
    </div></div>
    <div class="card danger"><div class="card-hd"><h4>위험 구역</h4></div><div class="card-body">
      <button class="btn btn-danger" onclick="delSub('${cat.id}','${sub.id}')">소분류 삭제</button>
    </div></div>`;
}
function saveSubI(cid,sid){fs(cid,sid).label=document.getElementById('ds_l').value.trim()||fs(cid,sid).label;markDirty();renderTree();}
function delSub(cid,sid){const s=fs(cid,sid);confirm2(`소분류 <b style="color:var(--text)">${s.label}</b>을 삭제하시겠습니까?`,()=>{fc(cid).subcategories=fc(cid).subcategories.filter(x=>x.id!==sid);markDirty();renderTree();selCat(cid);toast('삭제됐습니다');});}

function showVid(cat,sub,vid){
  const ph=(vid.pdfs||[]).map((p,i)=>pdfRowHtml(p,i)).join('');
  document.getElementById('detail').innerHTML=`
    <div class="bc">
      <span class="bc-link" onclick="selCat('${cat.id}')">${cat.label}</span><span>›</span>
      <span class="bc-link" onclick="selSub('${cat.id}','${sub.id}')">${sub.label}</span><span>›</span>
      <b style="font-size:13px">${vid.title}</b>
    </div>
    <div class="card"><div class="card-hd"><h4>강의 정보</h4></div><div class="card-body">
      <div class="field"><label>제목</label><input class="input" id="dv_t" value="${esc(vid.title)}" oninput="markDirty()"></div>
      <div class="field"><label>영상 파일 경로</label>
        <div class="row-btn"><input class="input input-mono" id="dv_s" value="${esc(vid.src||'')}" placeholder="videos/lecture.mp4 또는 Google Drive 공유 링크" oninput="markDirty()">
        <button class="btn btn-ghost btn-sm" onclick="pickFile('video','dv_s')">찾기</button></div>
        <div class="hint">Google Drive: 파일 공유 → 링크 복사 → 그대로 붙여넣기<br>예: <code>https://drive.google.com/file/d/1ABC.../view?usp=sharing</code></div>
      </div>
      <div class="field"><label>설명</label><textarea class="input" id="dv_d" oninput="markDirty()">${esc(vid.desc||'')}</textarea></div>
      <div style="display:flex;justify-content:flex-end"><button class="btn btn-solid" onclick="saveVidI('${cat.id}','${sub.id}','${vid.id}')">적용</button></div>
    </div></div>
    <div class="card"><div class="card-hd"><h4>PDF 자료 및 표시 구간</h4><span style="font-size:11px;color:var(--text3);margin-right:8px">시작·종료(초) 범위에만 버튼 표시</span></div><div class="card-body">
      <div class="pdf-rows" id="pdfRows_${vid.id}">${ph}</div>
      <div class="add-row" onclick="addPdf('${cat.id}','${sub.id}','${vid.id}')">+ 자료 추가</div>
      <div style="display:flex;justify-content:flex-end"><button class="btn btn-solid" onclick="savePdfs('${cat.id}','${sub.id}','${vid.id}')">자료 적용</button></div>
    </div></div>
    <div class="card danger"><div class="card-hd"><h4>위험 구역</h4></div><div class="card-body">
      <button class="btn btn-danger" onclick="delVid('${cat.id}','${sub.id}','${vid.id}')">강의 삭제</button>
    </div></div>`;
}

function pdfRowHtml(p,i){return `<div class="pdf-row" id="pr_${i}">
  <div class="pdf-row-hd"><div class="pdf-num">${i+1}</div><input class="input" data-f="name" value="${esc(p.name||'')}" placeholder="파일 표시 이름" style="flex:1" oninput="markDirty()"><button class="btn-ico" onclick="removePdf(${i})">${X_ICO}</button></div>
  <div class="field"><label>파일 경로</label><div class="row-btn"><input class="input input-mono" data-f="path" value="${esc(p.path||'')}" placeholder="pdfs/file.pdf" oninput="markDirty()"><button class="btn btn-ghost btn-sm" onclick="pickFilePdf(${i})">찾기</button></div></div>
  <div class="grid2">
    <div class="field"><label>버튼 레이블</label><input class="input" data-f="label" value="${esc(p.label||'')}" placeholder="예: 3장 요약" oninput="markDirty()"></div>
    <div class="field"><label>표시 구간 (초)</label><div class="tr-row"><input class="input input-mono" data-f="showFrom" value="${p.showFrom??''}" placeholder="시작" oninput="markDirty()"><span class="tr-sep">~</span><input class="input input-mono" data-f="showUntil" value="${p.showUntil??''}" placeholder="종료" oninput="markDirty()"><span class="tr-sep" style="font-size:10px">초</span></div></div>
  </div>
</div>`;}

function addPdf(cid,sid,vid_id){const v=fv(cid,sid,vid_id);if(!v.pdfs)v.pdfs=[];v.pdfs.push({id:uid(),name:'',path:'',label:'',showFrom:'',showUntil:''});markDirty();const c=document.getElementById('pdfRows_'+vid_id);if(c)c.innerHTML=v.pdfs.map((p,i)=>pdfRowHtml(p,i)).join('');}
function removePdf(idx){if(!sel?.vidId)return;const v=fv(sel.catId,sel.subId,sel.vidId);v.pdfs.splice(idx,1);markDirty();const c=document.getElementById('pdfRows_'+v.id);if(c)c.innerHTML=v.pdfs.map((p,i)=>pdfRowHtml(p,i)).join('');}
function savePdfs(cid,sid,vid_id){
  const v=fv(cid,sid,vid_id),c=document.getElementById('pdfRows_'+vid_id);if(!c)return;
  v.pdfs=Array.from(c.querySelectorAll('.pdf-row')).map((row,i)=>{
    const g=f=>row.querySelector(`[data-f="${f}"]`)?.value.trim()||'';
    const n=f=>{const x=row.querySelector(`[data-f="${f}"]`)?.value.trim();return x===''?'':Number(x);};
    return{id:v.pdfs[i]?.id||uid(),name:g('name'),path:g('path'),label:g('label'),showFrom:n('showFrom'),showUntil:n('showUntil')};
  });
  markDirty();toast('자료가 적용됐습니다. 저장 버튼으로 서버에 반영하세요.');
}
function saveVidI(cid,sid,vid_id){const v=fv(cid,sid,vid_id);v.title=document.getElementById('dv_t').value.trim()||v.title;v.src=document.getElementById('dv_s').value.trim();v.desc=document.getElementById('dv_d').value.trim();markDirty();renderTree();updSel();toast('적용됐습니다');}
function delVid(cid,sid,vid_id){const v=fv(cid,sid,vid_id);confirm2(`강의 <b style="color:var(--text)">${v.title}</b>을 삭제하시겠습니까?`,()=>{fs(cid,sid).videos=fs(cid,sid).videos.filter(x=>x.id!==vid_id);markDirty();renderTree();selSub(cid,sid);toast('삭제됐습니다');});}

// ADD
function addCat(){document.getElementById('catName').value='';document.getElementById('catColor').value='#2060e8';buildIG('catIG','📦',()=>{});om('moCat');}
function saveCatM(){const name=document.getElementById('catName').value.trim();const icon=document.querySelector('#catIG .sel')?.dataset.icon||'📦';const color=document.getElementById('catColor').value;if(!name){toast('이름을 입력하세요');return;}const cat={id:uid(),label:name,icon,color,subcategories:[]};data.push(cat);openNodes.add(cat.id);markDirty();renderTree();cm('moCat');selCat(cat.id);}
function addSub(cid){ctx={catId:cid};document.getElementById('subName').value='';om('moSub');}
function saveSubM(){const name=document.getElementById('subName').value.trim();if(!name){toast('이름을 입력하세요');return;}const sub={id:uid(),label:name,videos:[]};fc(ctx.catId).subcategories.push(sub);openNodes.add(ctx.catId);openNodes.add(sub.id);markDirty();renderTree();cm('moSub');selSub(ctx.catId,sub.id);}
function addVid(cid,sid){const sub=fs(cid,sid);const vid={id:uid(),title:'새 강의 '+(sub.videos.length+1),src:'',desc:'',pdfs:[]};sub.videos.push(vid);openNodes.add(cid);openNodes.add(sid);markDirty();renderTree();selVid(cid,sid,vid.id);}

// FILE PICKER
async function pickFile(type,inputId){
  _pt=inputId;const files=await af('/api/files/'+(type==='video'?'videos':'pdfs'));
  document.getElementById('moFileTit').textContent=type==='video'?'영상 파일 선택':'PDF 파일 선택';
  document.getElementById('moFileHint').textContent='public/'+(type==='video'?'videos/':'pdfs/')+'폴더';
  renderFileList(files);_ps=null;om('moFile');
}
async function pickFilePdf(idx){
  _pt='__pdf_'+idx;const files=await af('/api/files/pdfs');
  document.getElementById('moFileTit').textContent='PDF 파일 선택';
  document.getElementById('moFileHint').textContent='public/pdfs/ 폴더';
  renderFileList(files);_ps=null;om('moFile');
}
function renderFileList(files){
  const list=document.getElementById('fileList');
  if(!files.length){list.innerHTML=`<div style="text-align:center;padding:16px;font-size:13px;color:var(--text3)">파일이 없습니다</div>`;return;}
  list.innerHTML=files.map(f=>`<div class="file-row" onclick="pickRow(this,'${f.path}')" data-path="${f.path}"><div><div class="file-name">${f.name}</div><div class="file-path">${f.path}</div></div></div>`).join('');
}
function pickRow(el,path){document.querySelectorAll('.file-row').forEach(r=>r.classList.remove('sel'));el.classList.add('sel');_ps=path;}
function confirmPick(){
  if(!_ps){toast('파일을 선택하세요');return;}
  if(_pt.startsWith('__pdf_')){const idx=parseInt(_pt.split('_')[3]);const row=document.getElementById('pr_'+idx);if(row){row.querySelector('[data-f="path"]').value=_ps;markDirty();}}
  else{const inp=document.getElementById(_pt);if(inp){inp.value=_ps;markDirty();}}
  cm('moFile');
}

// ICON GRID
function buildIG(cid,selIcon,onChange){const el=document.getElementById(cid);if(!el)return;el.innerHTML='';ICONS.forEach(ic=>{const btn=document.createElement('div');btn.className='icon-opt'+(ic===selIcon?' sel':'');btn.textContent=ic;btn.dataset.icon=ic;btn.onclick=()=>{el.querySelectorAll('.icon-opt').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');onChange(ic);};el.appendChild(btn);});}

// MODALS
function om(id){document.getElementById(id).classList.add('open');}
function cm(id){document.getElementById(id).classList.remove('open');}
function bgClose(e,id){if(e.target===document.getElementById(id))cm(id);}
function confirm2(msg,fn){document.getElementById('confirmMsg').innerHTML=msg;_cf=()=>{fn();cm('moConfirm');};om('moConfirm');}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let _t;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(_t);_t=setTimeout(()=>t.classList.remove('show'),2400);}

window.addEventListener('beforeunload',e=>{if(dirty){e.preventDefault();e.returnValue='';}});
(async()=>{if(await checkAuth())loadData();})();
</script>
</body>
</html>
