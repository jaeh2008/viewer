<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강의 관리 · eduPLAY</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0f14; --surface:#161820; --surface2:#1e2029; --surface3:#252731;
  --border:#2e3040; --accent:#4f8cff; --accent2:#7c5cfc; --ag:rgba(79,140,255,0.12);
  --text:#e8eaf0; --text2:#9ea3b8; --text3:#5c6278;
  --green:#3dd68c; --red:#ff5f6d; --orange:#ffb347;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.topbar{height:54px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:14px;position:sticky;top:0;z-index:200}
.logo{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:8px;white-space:nowrap}
.logo em{color:var(--text3);font-style:normal;font-weight:400}
.badge{background:var(--orange);color:#000;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.save-ind{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px}
.save-ind.saving{color:var(--orange)} .save-ind.saved{color:var(--green)} .save-ind.unsaved{color:var(--red)}

.btn{padding:7px 13px;border-radius:7px;font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s;border:1px solid transparent;display:inline-flex;align-items:center;gap:6px;font-weight:500;white-space:nowrap}
.btn-ghost{background:var(--surface2);border-color:var(--border);color:var(--text2)}
.btn-ghost:hover{background:var(--surface3);color:var(--text);border-color:var(--accent)}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{opacity:.85}
.btn-green{background:var(--green);color:#000}
.btn-green:hover{opacity:.85}
.btn-red{background:transparent;border-color:var(--red);color:var(--red)}
.btn-red:hover{background:rgba(255,95,109,.1)}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-xs{padding:3px 7px;font-size:10px}

.layout{display:flex;height:calc(100vh - 54px)}
.tree-panel{width:290px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-hd{padding:13px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.panel-hd h3{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3)}
.tree-scroll{flex:1;overflow-y:auto;padding:6px 0}
.tree-scroll::-webkit-scrollbar{width:4px}
.tree-scroll::-webkit-scrollbar-thumb{background:var(--border)}

.t-cat-hd{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;user-select:none;transition:background .1s}
.t-cat-hd:hover,.t-sub-hd:hover,.t-vid:hover{background:var(--surface2)}
.t-arrow{width:14px;height:14px;color:var(--text3);transition:transform .18s;flex-shrink:0}
.t-arrow svg{width:100%;height:100%}
.t-cat.open .t-cat-hd .t-arrow,.t-sub.open .t-sub-hd .t-arrow{transform:rotate(90deg)}
.t-icon{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.t-label{flex:1;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-count{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;flex-shrink:0}
.t-cat-body{display:none}.t-cat.open .t-cat-body{display:block}
.t-sub-hd{display:flex;align-items:center;gap:7px;padding:6px 12px 6px 28px;cursor:pointer;user-select:none;transition:background .1s}
.t-sub-label{flex:1;font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-sub-count{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.t-sub-body{display:none}.t-sub.open .t-sub-body{display:block}
.t-vid{display:flex;align-items:center;gap:7px;padding:6px 12px 6px 44px;cursor:pointer;transition:background .1s}
.t-vid.sel{background:var(--ag);border-right:2px solid var(--accent)}
.t-vid.sel .t-vid-title{color:var(--accent)}
.t-dot{width:5px;height:5px;border-radius:50%;background:var(--border);flex-shrink:0}
.t-vid.sel .t-dot{background:var(--accent)}
.t-vid-title{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}

.detail{flex:1;overflow-y:auto;padding:24px 28px}
.detail::-webkit-scrollbar{width:6px}
.detail::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--text3)}
.empty-state .ei{font-size:52px;opacity:.2}

.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:18px;overflow:hidden}
.card-hd{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.card-hd h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);flex:1}
.card-body{padding:18px;display:flex;flex-direction:column;gap:14px}

.field{display:flex;flex-direction:column;gap:5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px}
.input{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 11px;font-size:13px;color:var(--text);font-family:inherit;outline:none;transition:border-color .15s;width:100%}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:var(--text3)}
.input-mono{font-family:'JetBrains Mono',monospace;font-size:12px}
textarea.input{resize:vertical;min-height:65px;line-height:1.6}
.file-row-wrap{display:flex;gap:6px}
.file-row-wrap .input{flex:1}

.color-row{display:flex;align-items:center;gap:10px}
.color-row input[type=color]{width:36px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);cursor:pointer}
.icon-grid{display:flex;flex-wrap:wrap;gap:6px}
.icon-opt{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .1s}
.icon-opt:hover,.icon-opt.sel{border-color:var(--accent);background:var(--ag)}

.pdf-items{display:flex;flex-direction:column;gap:10px}
.pdf-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;gap:12px}
.pdf-item-hd{display:flex;align-items:center;gap:10px}
.pdf-num{width:22px;height:22px;border-radius:5px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text3);font-family:'JetBrains Mono',monospace;flex-shrink:0}
.time-range-row{display:flex;align-items:center;gap:8px}
.time-range-row .input{width:90px;text-align:center}
.time-range-row .sep{font-size:11px;color:var(--text3);flex-shrink:0}
.add-pdf{border:1px dashed var(--border);border-radius:10px;padding:11px;text-align:center;color:var(--text3);font-size:12px;cursor:pointer;transition:all .15s}
.add-pdf:hover{border-color:var(--accent);color:var(--accent);background:var(--ag)}

.card.danger{border-color:rgba(255,95,109,.25)}
.card.danger .card-hd{background:rgba(255,95,109,.04)}

.bc{display:flex;align-items:center;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.bc span,.bc strong{font-size:12px}
.bc-link{color:var(--accent);cursor:pointer;font-size:12px}
.bc-link:hover{text-decoration:underline}

.mo{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.mo.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:460px;max-width:92vw;overflow:hidden;animation:mIn .2s ease}
.modal.wide{width:580px}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mo-hd{padding:15px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.mo-hd h3{font-size:14px;font-weight:600;flex:1}
.mo-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:17px;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.mo-close:hover{background:var(--surface2);color:var(--text)}
.mo-body{padding:18px 20px;display:flex;flex-direction:column;gap:12px;max-height:70vh;overflow-y:auto}
.mo-foot{padding:13px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

.file-list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto}
.file-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;background:var(--surface2)}
.file-row:hover{border-color:var(--accent);background:var(--ag)}
.file-row.sel{border-color:var(--accent);background:var(--ag)}
.file-row-name{flex:1;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text)}
.file-row-path{font-size:10px;color:var(--text3);margin-top:2px}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:13px;color:var(--text);z-index:9999;transition:transform .28s ease;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">▶ <em>edu</em>PLAY <span class="badge">ADMIN</span></div>
  <div class="save-ind" id="saveInd"><span id="saveText">저장됨</span></div>
  <div class="topbar-right">
    <button class="btn btn-ghost" onclick="window.open('/player.html','_blank')">▶ 플레이어</button>
    <button class="btn btn-accent" onclick="saveAll()">💾 저장</button>
    <button class="btn btn-ghost" onclick="doLogout()">로그아웃</button>
  </div>
</div>

<div class="layout">
  <div class="tree-panel">
    <div class="panel-hd">
      <h3>강의 목록</h3>
      <button class="btn btn-accent btn-sm" onclick="addCat()">+ 대분류</button>
    </div>
    <div class="tree-scroll" id="treeRoot"></div>
  </div>
  <div class="detail" id="detail">
    <div class="empty-state"><div class="ei">🗂️</div><p>항목을 선택하거나 대분류를 추가하세요</p></div>
  </div>
</div>

<!-- ADD CAT -->
<div class="mo" id="moCat" onclick="bgClose(event,'moCat')">
  <div class="modal">
    <div class="mo-hd"><h3>대분류 추가</h3><button class="mo-close" onclick="cm('moCat')">✕</button></div>
    <div class="mo-body">
      <div class="field"><label>이름</label><input class="input" id="catName" placeholder="예: 1. Python 기초"></div>
      <div class="field"><label>아이콘</label><div class="icon-grid" id="catIG"></div></div>
      <div class="field"><label>색상</label><div class="color-row"><input type="color" id="catColor" value="#4f8cff"><span style="font-size:12px;color:var(--text3)">아이콘 색</span></div></div>
    </div>
    <div class="mo-foot"><button class="btn btn-ghost" onclick="cm('moCat')">취소</button><button class="btn btn-accent" onclick="saveCatM()">추가</button></div>
  </div>
</div>

<!-- ADD SUB -->
<div class="mo" id="moSub" onclick="bgClose(event,'moSub')">
  <div class="modal">
    <div class="mo-hd"><h3>소분류 추가</h3><button class="mo-close" onclick="cm('moSub')">✕</button></div>
    <div class="mo-body">
      <div class="field"><label>이름</label><input class="input" id="subName" placeholder="예: 1-1. 환경 설정"></div>
    </div>
    <div class="mo-foot"><button class="btn btn-ghost" onclick="cm('moSub')">취소</button><button class="btn btn-accent" onclick="saveSubM()">추가</button></div>
  </div>
</div>

<!-- CONFIRM -->
<div class="mo" id="moConfirm" onclick="bgClose(event,'moConfirm')">
  <div class="modal">
    <div class="mo-hd"><h3>삭제 확인</h3><button class="mo-close" onclick="cm('moConfirm')">✕</button></div>
    <div class="mo-body"><div style="font-size:13px;color:var(--text2);line-height:1.6" id="confirmMsg"></div></div>
    <div class="mo-foot"><button class="btn btn-ghost" onclick="cm('moConfirm')">취소</button><button class="btn btn-red" onclick="_cf()">삭제</button></div>
  </div>
</div>

<!-- FILE PICKER -->
<div class="mo" id="moFile" onclick="bgClose(event,'moFile')">
  <div class="modal wide">
    <div class="mo-hd"><h3 id="moFileTitle">파일 선택</h3><button class="mo-close" onclick="cm('moFile')">✕</button></div>
    <div class="mo-body">
      <div style="font-size:12px;color:var(--text3)" id="moFileHint"></div>
      <div class="file-list" id="fileList"></div>
      <div style="font-size:11px;color:var(--text3);margin-top:6px">파일이 없으면 서버의 <code style="color:var(--accent)">public/videos/</code> 또는 <code style="color:var(--accent)">public/pdfs/</code> 폴더에 넣으세요.</div>
    </div>
    <div class="mo-foot"><button class="btn btn-ghost" onclick="cm('moFile')">취소</button><button class="btn btn-accent" onclick="confirmPick()">선택</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ICONS=['🐍','⚡','🔷','📦','🧮','🔬','🌐','🎨','🔧','📊','🏗️','🧩','🚀','💡','🔐','📡','🧠','🎯','🌿','⚙️','📚','🎓','🎵','🖥️','🔑'];

// ── AUTH ──────────────────────────────────────
let TOKEN = sessionStorage.getItem('adminToken') || new URLSearchParams(location.search).get('token') || '';

async function checkAuth() {
  if (!TOKEN) { location.href='/login.html'; return false; }
  const r = await fetch('/api/auth/check', { headers:{'x-admin-token':TOKEN} });
  const d = await r.json();
  if (!d.valid) { location.href='/login.html'; return false; }
  return true;
}

async function doLogout() {
  await fetch('/api/auth/logout', { method:'POST', headers:{'x-admin-token':TOKEN} });
  sessionStorage.removeItem('adminToken');
  location.href='/login.html';
}

// Authenticated fetch
async function aFetch(url, opts={}) {
  const headers = { 'Content-Type':'application/json', 'x-admin-token':TOKEN, ...(opts.headers||{}) };
  const r = await fetch(url, { ...opts, headers });
  if (r.status === 401) { location.href='/login.html'; throw new Error('auth'); }
  return r.json();
}

// ── DATA ─────────────────────────────────────
let data=[], sel=null, _addCtx={}, _cf=()=>{}, openNodes=new Set(), _dirty=false, _pickTarget=null, _pickSel=null;

async function loadData() {
  data = await aFetch('/api/courses');
  renderTree();
}

async function saveAll() {
  setSave('saving');
  await aFetch('/api/courses', { method:'POST', body:JSON.stringify(data) });
  setSave('saved'); _dirty=false; showToast('✓ 서버에 저장됨');
}

function dirty() { _dirty=true; setSave('unsaved'); }
function setSave(s) {
  const el=document.getElementById('saveInd'), tx=document.getElementById('saveText');
  el.className='save-ind '+s;
  tx.textContent = s==='saving'?'저장 중...':s==='saved'?'✓ 저장됨':'● 저장 안 됨';
}

// ── TREE ─────────────────────────────────────
function renderTree() {
  const root=document.getElementById('treeRoot'); root.innerHTML='';
  if(!data.length){root.innerHTML=`<div style="padding:20px;text-align:center;font-size:12px;color:var(--text3)">대분류를 추가하세요</div>`;return;}
  data.forEach(cat=>root.appendChild(makeCatEl(cat)));
  openNodes.forEach(id=>{ const n=document.getElementById('tn-'+id); if(n)n.classList.add('open'); });
}
function makeCatEl(cat) {
  const total=cat.subcategories.reduce((a,s)=>a+s.videos.length,0);
  const div=document.createElement('div');
  div.className='t-cat'+(openNodes.has(cat.id)?' open':''); div.id='tn-'+cat.id;
  div.innerHTML=`<div class="t-cat-hd" onclick="toggleNode('${cat.id}');selCat('${cat.id}')"><div class="t-arrow"><svg viewBox="0 0 16 16" fill="currentColor"><polygon points="6,4 12,8 6,12"/></svg></div><div class="t-icon" style="background:${cat.color}22;color:${cat.color}">${cat.icon}</div><div class="t-label">${cat.label}</div><div class="t-count">${total}</div></div><div class="t-cat-body"></div>`;
  const body=div.querySelector('.t-cat-body');
  cat.subcategories.forEach(sub=>body.appendChild(makeSubEl(cat.id,sub)));
  return div;
}
function makeSubEl(catId,sub) {
  const div=document.createElement('div');
  div.className='t-sub'+(openNodes.has(sub.id)?' open':''); div.id='tn-'+sub.id;
  div.innerHTML=`<div class="t-sub-hd" onclick="toggleNode('${sub.id}');selSub('${catId}','${sub.id}')"><div class="t-arrow"><svg viewBox="0 0 16 16" fill="currentColor"><polygon points="6,4 12,8 6,12"/></svg></div><div class="t-sub-label">${sub.label}</div><div class="t-sub-count">${sub.videos.length}</div></div><div class="t-sub-body"></div>`;
  const body=div.querySelector('.t-sub-body');
  sub.videos.forEach(vid=>body.appendChild(makeVidEl(catId,sub.id,vid)));
  return div;
}
function makeVidEl(catId,subId,vid) {
  const el=document.createElement('div');
  el.className='t-vid'+(sel?.vidId===vid.id?' sel':''); el.id='tn-'+vid.id;
  el.innerHTML=`<div class="t-dot"></div><div class="t-vid-title">${vid.title}</div>`;
  el.onclick=()=>selVid(catId,subId,vid.id); return el;
}
function toggleNode(id) { if(openNodes.has(id))openNodes.delete(id);else openNodes.add(id); document.getElementById('tn-'+id)?.classList.toggle('open',openNodes.has(id)); }
function updateSel() { document.querySelectorAll('.t-cat-hd,.t-sub-hd,.t-vid').forEach(el=>el.classList.remove('sel')); if(sel?.type==='vid') document.getElementById('tn-'+sel.vidId)?.classList.add('sel'); }

// ── SELECT ───────────────────────────────────
function selCat(id){sel={type:'cat',catId:id};updateSel();showCatDetail(fc(id));}
function selSub(cid,sid){sel={type:'sub',catId:cid,subId:sid};updateSel();showSubDetail(fc(cid),fs(cid,sid));}
function selVid(cid,sid,vid){sel={type:'vid',catId:cid,subId:sid,vidId:vid};updateSel();showVidDetail(fc(cid),fs(cid,sid),fv(cid,sid,vid));}
function fc(id){return data.find(c=>c.id===id);}
function fs(cid,sid){return fc(cid)?.subcategories.find(s=>s.id===sid);}
function fv(cid,sid,vid){return fs(cid,sid)?.videos.find(v=>v.id===vid);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

// ── DETAIL: CAT ──────────────────────────────
function showCatDetail(cat) {
  document.getElementById('detail').innerHTML=`
    <div class="bc"><strong>대분류 편집</strong></div>
    <div class="card"><div class="card-hd"><h4>대분류 정보</h4><button class="btn btn-ghost btn-sm" onclick="addSub('${cat.id}')">+ 소분류 추가</button></div>
    <div class="card-body">
      <div class="field"><label>이름</label><input class="input" id="dc_l" value="${esc(cat.label)}" oninput="dirty()"></div>
      <div class="grid2">
        <div class="field"><label>아이콘</label><div class="icon-grid" id="dc_ig"></div><input class="input input-mono" id="dc_i" value="${cat.icon}" style="margin-top:6px" oninput="dirty()"></div>
        <div class="field"><label>색상</label><div class="color-row"><input type="color" id="dc_c" value="${cat.color}" oninput="dirty()"><span style="font-size:12px;color:var(--text3)">아이콘 색</span></div></div>
      </div>
      <div style="display:flex;justify-content:flex-end"><button class="btn btn-accent" onclick="saveCatI('${cat.id}')">저장</button></div>
    </div></div>
    <div class="card danger"><div class="card-hd"><h4>⚠️ 위험 구역</h4></div><div class="card-body">
      <p style="font-size:13px;color:var(--text2)">이 대분류와 모든 하위 항목이 삭제됩니다.</p>
      <button class="btn btn-red" onclick="delCat('${cat.id}')">대분류 삭제</button>
    </div></div>`;
  buildIconGrid('dc_ig',cat.icon,ic=>{document.getElementById('dc_i').value=ic;dirty();});
}
function saveCatI(id){const c=fc(id);c.label=document.getElementById('dc_l').value.trim()||c.label;c.icon=document.getElementById('dc_i').value||c.icon;c.color=document.getElementById('dc_c').value;dirty();renderTree();updateSel();showToast('✓ 저장됨 (💾 버튼으로 서버 저장)');}
function delCat(id){const c=fc(id);showConfirm(`<b>${c.label}</b> 대분류와 모든 하위 항목을 삭제하시겠습니까?`,()=>{data=data.filter(x=>x.id!==id);sel=null;dirty();renderTree();document.getElementById('detail').innerHTML=`<div class="empty-state"><div class="ei">🗂️</div><p>항목을 선택하세요</p></div>`;showToast('🗑️ 삭제됨');});}

// ── DETAIL: SUB ──────────────────────────────
function showSubDetail(cat,sub){
  document.getElementById('detail').innerHTML=`
    <div class="bc"><span class="bc-link" onclick="selCat('${cat.id}')">${cat.icon} ${cat.label}</span><span>›</span><strong>${sub.label}</strong></div>
    <div class="card"><div class="card-hd"><h4>소분류 정보</h4><button class="btn btn-ghost btn-sm" onclick="addVid('${cat.id}','${sub.id}')">+ 강의 추가</button></div>
    <div class="card-body">
      <div class="field"><label>이름</label><input class="input" id="ds_l" value="${esc(sub.label)}" oninput="dirty()"></div>
      <div style="display:flex;justify-content:flex-end"><button class="btn btn-accent" onclick="saveSubI('${cat.id}','${sub.id}')">저장</button></div>
    </div></div>
    <div class="card danger"><div class="card-hd"><h4>⚠️ 위험 구역</h4></div><div class="card-body">
      <button class="btn btn-red" onclick="delSub('${cat.id}','${sub.id}')">소분류 삭제</button>
    </div></div>`;
}
function saveSubI(cid,sid){fs(cid,sid).label=document.getElementById('ds_l').value.trim()||fs(cid,sid).label;dirty();renderTree();}
function delSub(cid,sid){const s=fs(cid,sid);showConfirm(`소분류 <b>${s.label}</b>을 삭제하시겠습니까?`,()=>{fc(cid).subcategories=fc(cid).subcategories.filter(x=>x.id!==sid);dirty();renderTree();selCat(cid);showToast('🗑️ 삭제됨');});}

// ── DETAIL: VID ──────────────────────────────
function showVidDetail(cat,sub,vid){
  const ph=( vid.pdfs||[]).map((p,i)=>pdfHtml(p,i)).join('');
  document.getElementById('detail').innerHTML=`
    <div class="bc"><span class="bc-link" onclick="selCat('${cat.id}')">${cat.icon} ${cat.label}</span><span>›</span><span class="bc-link" onclick="selSub('${cat.id}','${sub.id}')">${sub.label}</span><span>›</span><strong>${vid.title}</strong></div>
    <div class="card"><div class="card-hd"><h4>🎬 강의 기본 정보</h4></div><div class="card-body">
      <div class="field"><label>제목</label><input class="input" id="dv_t" value="${esc(vid.title)}" oninput="dirty()"></div>
      <div class="field"><label>영상 파일 경로</label>
        <div class="file-row-wrap"><input class="input input-mono" id="dv_s" value="${esc(vid.src||'')}" placeholder="videos/lecture.mp4" oninput="dirty()">
        <button class="btn btn-ghost btn-sm" onclick="pickFile('video','dv_s')">📁</button></div>
      </div>
      <div class="field"><label>설명</label><textarea class="input" id="dv_d" oninput="dirty()">${esc(vid.desc||'')}</textarea></div>
      <div style="display:flex;justify-content:flex-end"><button class="btn btn-accent" onclick="saveVidI('${cat.id}','${sub.id}','${vid.id}')">저장</button></div>
    </div></div>
    <div class="card"><div class="card-hd"><h4>📎 PDF 자료 & 표시 구간</h4><span style="font-size:11px;color:var(--text3);margin-right:8px">시작·종료(초) 범위에서만 버튼 표시</span></div><div class="card-body">
      <div class="pdf-items" id="pdfItems_${vid.id}">${ph}</div>
      <div class="add-pdf" onclick="addPdf('${cat.id}','${sub.id}','${vid.id}')">＋ PDF 자료 추가</div>
      <div style="display:flex;justify-content:flex-end"><button class="btn btn-accent" onclick="savePdfs('${cat.id}','${sub.id}','${vid.id}')">자료 저장</button></div>
    </div></div>
    <div class="card danger"><div class="card-hd"><h4>⚠️ 위험 구역</h4></div><div class="card-body">
      <button class="btn btn-red" onclick="delVid('${cat.id}','${sub.id}','${vid.id}')">강의 삭제</button>
    </div></div>`;
}
function pdfHtml(p,i){return `<div class="pdf-item" id="pr_${i}">
  <div class="pdf-item-hd"><div class="pdf-num">${i+1}</div><input class="input" data-f="name" value="${esc(p.name||'')}" placeholder="파일 표시 이름" style="flex:1" oninput="dirty()"><button class="btn btn-ghost btn-xs" style="color:var(--red);border-color:rgba(255,95,109,.3)" onclick="removePdf(${i})">✕</button></div>
  <div class="field"><label>파일 경로</label><div class="file-row-wrap"><input class="input input-mono" data-f="path" value="${esc(p.path||'')}" placeholder="pdfs/material.pdf" oninput="dirty()"><button class="btn btn-ghost btn-sm" onclick="pickFilePdf(${i})">📁</button></div></div>
  <div class="grid2">
    <div class="field"><label>버튼 레이블</label><input class="input" data-f="label" value="${esc(p.label||'')}" placeholder="예: 3장 요약" oninput="dirty()"></div>
    <div class="field"><label>표시 구간 (초)</label><div class="time-range-row"><input class="input input-mono" data-f="showFrom" value="${p.showFrom??''}" placeholder="시작" oninput="dirty()"><span class="sep">~</span><input class="input input-mono" data-f="showUntil" value="${p.showUntil??''}" placeholder="종료" oninput="dirty()"><span class="sep" style="font-size:10px">초</span></div></div>
  </div>
</div>`;}

function addPdf(cid,sid,vid_id){const v=fv(cid,sid,vid_id);if(!v.pdfs)v.pdfs=[];v.pdfs.push({id:uid(),name:'',path:'',label:'',showFrom:'',showUntil:''});dirty();const c=document.getElementById('pdfItems_'+vid_id);if(c)c.innerHTML=v.pdfs.map((p,i)=>pdfHtml(p,i)).join('');}
function removePdf(idx){if(!sel?.vidId)return;const v=fv(sel.catId,sel.subId,sel.vidId);v.pdfs.splice(idx,1);dirty();const c=document.getElementById('pdfItems_'+v.id);if(c)c.innerHTML=v.pdfs.map((p,i)=>pdfHtml(p,i)).join('');}
function savePdfs(cid,sid,vid_id){
  const v=fv(cid,sid,vid_id); const c=document.getElementById('pdfItems_'+vid_id); if(!c)return;
  v.pdfs=Array.from(c.querySelectorAll('.pdf-item')).map((row,i)=>{
    const g=f=>row.querySelector(`[data-f="${f}"]`)?.value.trim()||'';
    const n=f=>{const x=row.querySelector(`[data-f="${f}"]`)?.value.trim();return x===''?'':Number(x);};
    return{id:v.pdfs[i]?.id||uid(),name:g('name'),path:g('path'),label:g('label'),showFrom:n('showFrom'),showUntil:n('showUntil')};
  });
  dirty();showToast('✓ PDF 저장됨 (💾 버튼으로 서버 저장)');
}
function saveVidI(cid,sid,vid_id){const v=fv(cid,sid,vid_id);v.title=document.getElementById('dv_t').value.trim()||v.title;v.src=document.getElementById('dv_s').value.trim();v.desc=document.getElementById('dv_d').value.trim();dirty();renderTree();updateSel();showToast('✓ 저장됨');}
function delVid(cid,sid,vid_id){const v=fv(cid,sid,vid_id);showConfirm(`강의 <b>${v.title}</b>을 삭제하시겠습니까?`,()=>{fs(cid,sid).videos=fs(cid,sid).videos.filter(x=>x.id!==vid_id);dirty();renderTree();selSub(cid,sid);showToast('🗑️ 삭제됨');});}

// ── ADD ──────────────────────────────────────
function addCat(){document.getElementById('catName').value='';document.getElementById('catColor').value='#4f8cff';buildIconGrid('catIG','📦',()=>{});om('moCat');}
function saveCatM(){const name=document.getElementById('catName').value.trim();const icon=document.querySelector('#catIG .sel')?.dataset.icon||'📦';const color=document.getElementById('catColor').value;if(!name){showToast('⚠️ 이름을 입력하세요');return;}const cat={id:uid(),label:name,icon,color,subcategories:[]};data.push(cat);openNodes.add(cat.id);dirty();renderTree();cm('moCat');selCat(cat.id);}
function addSub(catId){_addCtx={catId};document.getElementById('subName').value='';om('moSub');}
function saveSubM(){const name=document.getElementById('subName').value.trim();if(!name){showToast('⚠️ 이름을 입력하세요');return;}const sub={id:uid(),label:name,videos:[]};fc(_addCtx.catId).subcategories.push(sub);openNodes.add(_addCtx.catId);openNodes.add(sub.id);dirty();renderTree();cm('moSub');selSub(_addCtx.catId,sub.id);}
function addVid(catId,subId){const sub=fs(catId,subId);const vid={id:uid(),title:'새 강의 '+(sub.videos.length+1),src:'',desc:'',pdfs:[]};sub.videos.push(vid);openNodes.add(catId);openNodes.add(subId);dirty();renderTree();selVid(catId,subId,vid.id);}

// ── FILE PICKER ──────────────────────────────
async function pickFile(type,inputId){
  _pickTarget=inputId;
  const files=await aFetch('/api/files/'+(type==='video'?'videos':'pdfs'));
  document.getElementById('moFileTitle').textContent=type==='video'?'영상 파일 선택':'PDF 파일 선택';
  document.getElementById('moFileHint').textContent='public/'+(type==='video'?'videos':'pdfs')+'/ 폴더의 파일 목록';
  renderFileList(files,type==='video'?'🎬':'📄');
  _pickSel=null; om('moFile');
}
async function pickFilePdf(idx){
  _pickTarget='__pdf_'+idx;
  const files=await aFetch('/api/files/pdfs');
  document.getElementById('moFileTitle').textContent='PDF 파일 선택';
  document.getElementById('moFileHint').textContent='public/pdfs/ 폴더의 파일 목록';
  renderFileList(files,'📄');
  _pickSel=null; om('moFile');
}
function renderFileList(files,icon){
  const list=document.getElementById('fileList');
  if(!files.length){list.innerHTML=`<div style="text-align:center;padding:20px;font-size:12px;color:var(--text3)">파일이 없습니다.</div>`;return;}
  list.innerHTML=files.map(f=>`<div class="file-row" onclick="pickRow(this,'${f.path}')" data-path="${f.path}"><span style="font-size:16px">${icon}</span><div><div class="file-row-name">${f.name}</div><div class="file-row-path">${f.path}</div></div></div>`).join('');
}
function pickRow(el,path){document.querySelectorAll('.file-row').forEach(r=>r.classList.remove('sel'));el.classList.add('sel');_pickSel=path;}
function confirmPick(){
  if(!_pickSel){showToast('⚠️ 파일을 선택하세요');return;}
  if(_pickTarget.startsWith('__pdf_')){
    const idx=parseInt(_pickTarget.split('_')[3]);
    document.getElementById('pr_'+idx)?.querySelector('[data-f="path"]')?.setAttribute('value',_pickSel);
    document.getElementById('pr_'+idx)?.querySelector('[data-f="path"]') && (document.getElementById('pr_'+idx).querySelector('[data-f="path"]').value=_pickSel);
  }else{const inp=document.getElementById(_pickTarget);if(inp)inp.value=_pickSel;}
  dirty(); cm('moFile');
}

// ── ICON GRID ────────────────────────────────
function buildIconGrid(cid,sel,onChange){
  const el=document.getElementById(cid);if(!el)return;el.innerHTML='';
  ICONS.forEach(ic=>{const btn=document.createElement('div');btn.className='icon-opt'+(ic===sel?' sel':'');btn.textContent=ic;btn.dataset.icon=ic;btn.onclick=()=>{el.querySelectorAll('.icon-opt').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');onChange(ic);};el.appendChild(btn);});
}

// ── MODALS ───────────────────────────────────
function om(id){document.getElementById(id).classList.add('open');}
function cm(id){document.getElementById(id).classList.remove('open');}
function bgClose(e,id){if(e.target===document.getElementById(id))cm(id);}
function showConfirm(msg,fn){document.getElementById('confirmMsg').innerHTML=msg;_cf=()=>{fn();cm('moConfirm');};om('moConfirm');}

// ── UTILS ────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let _tt;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2400);}

window.addEventListener('beforeunload',e=>{if(_dirty){e.preventDefault();e.returnValue='';}});

// ── INIT ─────────────────────────────────────
(async()=>{if(await checkAuth()) loadData();})();
</script>
</body>
</html>
