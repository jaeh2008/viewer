<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 로그인 · eduPLAY</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0f14; --surface:#161820; --surface2:#1e2029;
  --border:#2e3040; --accent:#4f8cff; --text:#e8eaf0; --text2:#9ea3b8; --text3:#5c6278;
  --red:#ff5f6d; --green:#3dd68c;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; align-items:center; justify-content:center; }

/* BG GRID */
body::before {
  content:''; position:fixed; inset:0;
  background-image: linear-gradient(rgba(79,140,255,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(79,140,255,.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events:none;
}

.box {
  background:var(--surface); border:1px solid var(--border); border-radius:16px;
  padding:40px 36px; width:360px; max-width:92vw;
  box-shadow: 0 24px 64px rgba(0,0,0,.5);
  animation: boxIn .3s ease;
}
@keyframes boxIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

.logo { font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:600; color:var(--accent); text-align:center; margin-bottom:6px; }
.logo em { color:var(--text3); font-style:normal; font-weight:400; }
.subtitle { text-align:center; font-size:12px; color:var(--text3); margin-bottom:32px; }

.field { display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--text3); }
.input {
  background:var(--surface2); border:1px solid var(--border); border-radius:8px;
  padding:11px 14px; font-size:14px; color:var(--text); font-family:inherit;
  outline:none; transition:border-color .15s; width:100%;
}
.input:focus { border-color:var(--accent); }
.input::placeholder { color:var(--text3); }

.btn-login {
  width:100%; padding:12px; background:var(--accent); border:none; border-radius:10px;
  color:#fff; font-size:14px; font-weight:700; font-family:inherit;
  cursor:pointer; transition:all .15s; margin-top:8px;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-login:hover { opacity:.88; }
.btn-login:active { transform:scale(.98); }
.btn-login:disabled { opacity:.5; cursor:default; }

.error {
  background:rgba(255,95,109,.1); border:1px solid rgba(255,95,109,.3);
  border-radius:8px; padding:10px 14px; font-size:12px; color:var(--red);
  margin-top:12px; display:none; text-align:center;
}
.error.show { display:block; }

.go-player { text-align:center; margin-top:20px; }
.go-player a { font-size:12px; color:var(--text3); text-decoration:none; transition:color .15s; }
.go-player a:hover { color:var(--accent); }
</style>
</head>
<body>

<div class="box">
  <div class="logo">▶ <em>edu</em>PLAY</div>
  <div class="subtitle">관리자 페이지 로그인</div>

  <div class="field">
    <label>비밀번호</label>
    <input class="input" type="password" id="pw" placeholder="관리자 비밀번호 입력" autofocus>
  </div>

  <button class="btn-login" id="loginBtn" onclick="doLogin()">
    <span id="btnText">🔑 로그인</span>
  </button>

  <div class="error" id="errMsg">비밀번호가 올바르지 않습니다.</div>

  <div class="go-player">
    <a href="/player.html">▶ 플레이어로 이동 →</a>
  </div>
</div>

<script>
document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const pw  = document.getElementById('pw').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errMsg');
  const txt = document.getElementById('btnText');

  if (!pw) { err.textContent='비밀번호를 입력하세요.'; err.classList.add('show'); return; }

  btn.disabled = true;
  txt.textContent = '확인 중...';
  err.classList.remove('show');

  try {
    const res  = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    const data = await res.json();

    if (data.ok) {
      sessionStorage.setItem('adminToken', data.token);
      window.location.href = '/admin.html?token=' + data.token;
    } else {
      throw new Error();
    }
  } catch {
    err.textContent = '비밀번호가 올바르지 않습니다.';
    err.classList.add('show');
    btn.disabled = false;
    txt.textContent = '🔑 로그인';
    document.getElementById('pw').select();
  }
}
</script>
</body>
</html>
