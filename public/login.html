<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 · eduPLAY</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f6f6f4;--surface:#fff;--border:#e3e3e0;--border2:#d4d4d0;--text:#1a1a18;--text2:#6b6b66;--text3:#a8a8a3;--accent:#2060e8;--red:#dc2626;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:36px 32px;width:360px;max-width:92vw;box-shadow:0 4px 32px rgba(0,0,0,.06);animation:up .24s ease}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.logo{font-size:17px;font-weight:600;letter-spacing:-.3px;color:var(--text);margin-bottom:4px}
.logo span{color:var(--text3);font-weight:400}
.sub{font-size:13px;color:var(--text3);margin-bottom:28px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3)}
.input{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:10px 12px;font-size:14px;color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
.input:focus{border-color:var(--accent);background:var(--surface)}
.input::placeholder{color:var(--text3)}
.btn-login{width:100%;padding:11px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .15s;margin-top:6px}
.btn-login:hover{opacity:.88}.btn-login:disabled{opacity:.5;cursor:default}
.err{background:#fef2f2;border:1px solid #fecaca;border-radius:7px;padding:9px 13px;font-size:12px;color:var(--red);margin-top:10px;display:none;text-align:center}
.err.show{display:block}
.link{text-align:center;margin-top:18px}
.link a{font-size:12px;color:var(--text3);text-decoration:none;transition:color .12s}
.link a:hover{color:var(--accent)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">edu<span>PLAY</span></div>
  <div class="sub">관리자 로그인</div>
  <div class="field">
    <label>비밀번호</label>
    <input class="input" type="password" id="pw" placeholder="관리자 비밀번호" autofocus>
  </div>
  <button class="btn-login" id="btn" onclick="login()">로그인</button>
  <div class="err" id="err">비밀번호가 올바르지 않습니다.</div>
  <div class="link"><a href="/player.html">플레이어로 이동</a></div>
</div>
<script>
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
async function login(){
  const pw=document.getElementById('pw').value,btn=document.getElementById('btn'),err=document.getElementById('err');
  if(!pw){err.textContent='비밀번호를 입력하세요.';err.classList.add('show');return;}
  btn.disabled=true;btn.textContent='확인 중...';err.classList.remove('show');
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
    const d=await r.json();
    if(d.ok){sessionStorage.setItem('adminToken',d.token);window.location.href='/admin.html?token='+d.token;}
    else throw new Error();
  }catch{err.textContent='비밀번호가 올바르지 않습니다.';err.classList.add('show');btn.disabled=false;btn.textContent='로그인';document.getElementById('pw').select();}
}
</script>
</body>
</html>
