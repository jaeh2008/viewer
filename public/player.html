<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eduPLAY</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f6f6f4; --surface:#ffffff; --surface2:#f2f2f0; --surface3:#ebebea;
  --border:#e3e3e0; --border2:#d4d4d0;
  --text:#1a1a18; --text2:#6b6b66; --text3:#a8a8a3;
  --accent:#2060e8; --accent-bg:#eff4ff;
  --green:#16a34a; --green-bg:#f0fdf4;
  --red:#dc2626; --amber:#d97706;
  --sidebar-w:272px; --topbar-h:50px; --r:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* TOPBAR */
.topbar{height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;position:fixed;top:0;left:0;right:0;z-index:100}
.t-logo{font-weight:600;font-size:15px;letter-spacing:-.3px;color:var(--text);user-select:none;white-space:nowrap}
.t-logo span{color:var(--text3);font-weight:400}
.t-div{width:1px;height:18px;background:var(--border);flex-shrink:0}
.t-title{flex:1;font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-title b{color:var(--text);font-weight:500}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;transition:background .12s,color .12s,border-color .12s;border:1px solid transparent;white-space:nowrap;flex-shrink:0;line-height:1}
.btn-ghost{background:transparent;border-color:var(--border);color:var(--text2)}
.btn-ghost:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.btn-solid{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-solid:hover{opacity:.88}
.btn-done{background:var(--green-bg);color:var(--green);border-color:#bbf7d0}
.btn-done:hover{background:#dcfce7}
.btn-ico{padding:6px;border-radius:6px;background:transparent;border:none;color:var(--text2);cursor:pointer;transition:background .12s,color .12s;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-ico:hover{background:var(--surface2);color:var(--text)}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - var(--topbar-h));margin-top:var(--topbar-h)}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .22s cubic-bezier(.4,0,.2,1)}
.sidebar.collapsed{width:0}
.sb-top{padding:12px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-lbl{font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;padding:0 2px}
.sb-search{position:relative}
.sb-search input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px 7px 32px;font-size:13px;color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
.sb-search input:focus{border-color:var(--accent);background:var(--surface)}
.sb-search input::placeholder{color:var(--text3)}
.sb-si{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text3);display:flex}
.sb-cnt{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;padding:6px 16px 2px;flex-shrink:0}
.tree{flex:1;overflow-y:auto;padding:4px 0 16px}
.tree::-webkit-scrollbar{width:0}.tree:hover::-webkit-scrollbar{width:4px}
.tree::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* TREE */
.t-cat-hd{display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;user-select:none;transition:background .1s}
.t-cat-hd:hover,.t-sub-hd:hover,.t-vid:hover{background:var(--surface2)}
.t-chv{color:var(--text3);transition:transform .18s;flex-shrink:0;display:flex}
.t-cat.open .t-cat-hd .t-chv,.t-sub.open .t-sub-hd .t-chv{transform:rotate(90deg)}
.t-cat-num{width:18px;height:18px;border-radius:4px;flex-shrink:0;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;letter-spacing:-.5px}
.t-cat-lbl{flex:1;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-bdg{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;background:var(--surface2);padding:1px 5px;border-radius:4px;flex-shrink:0}
.t-cat-body{display:none}.t-cat.open .t-cat-body{display:block}
.t-sub-hd{display:flex;align-items:center;gap:7px;padding:5px 14px 5px 32px;cursor:pointer;user-select:none;transition:background .1s}
.t-sub-lbl{flex:1;font-size:12.5px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-sub-body{display:none}.t-sub.open .t-sub-body{display:block}
.t-vid{display:flex;align-items:center;gap:8px;padding:5px 14px 5px 48px;cursor:pointer;transition:background .1s;position:relative}
.t-vid:hover{background:var(--surface2)}
.t-vid.active{background:var(--accent-bg)}
.t-vid.active .t-vid-tit{color:var(--accent);font-weight:500}
.t-vid.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:2px;background:var(--accent);border-radius:0 2px 2px 0}
.t-ind{width:5px;height:5px;border-radius:50%;background:var(--border2);flex-shrink:0;transition:background .2s}
.t-vid.active .t-ind{background:var(--accent)}.t-vid.watched .t-ind{background:var(--green)}
.t-vid-inf{flex:1;min-width:0}
.t-vid-tit{font-size:12.5px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-vid-meta{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:1px}

/* CONTENT */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--bg)}

/* VIDEO */
.vid-wrap{position:relative;background:#0a0a0a;flex-shrink:0}
.vid-wrap video{width:100%;display:block;max-height:55vh;object-fit:contain}
#gdFrame{width:100%;display:none;border:none;background:#000;max-height:55vh;aspect-ratio:16/9}
.vid-empty{width:100%;aspect-ratio:16/9;max-height:55vh;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.ve-ico{color:#2a2a28;display:flex}.ve-txt{font-size:13px;color:#3a3a38}

/* PDF OVERLAY */
.pdf-overlay{position:absolute;bottom:12px;right:12px;display:flex;flex-direction:column-reverse;gap:6px;z-index:20;pointer-events:none;max-width:260px}
.pdf-btn{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.97);border:1px solid var(--border);border-radius:var(--r);padding:9px 13px;cursor:pointer;backdrop-filter:blur(12px);pointer-events:all;animation:pIn .26s cubic-bezier(.34,1.4,.64,1);transition:box-shadow .15s,transform .15s;box-shadow:0 2px 12px rgba(0,0,0,.1)}
.pdf-btn:hover{box-shadow:0 4px 20px rgba(0,0,0,.15);transform:translateX(-2px)}
@keyframes pIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
.pb-ico{width:28px;height:28px;background:var(--accent-bg);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0}
.pb-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px}
.pb-lbl{font-size:11px;color:var(--text3);margin-top:1px}

/* GDRIVE */
.gd-badge{position:absolute;top:10px;left:10px;background:rgba(255,255,255,.92);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--text2);display:none;align-items:center;gap:6px;z-index:15;backdrop-filter:blur(8px);font-weight:500}
.gd-timer{position:absolute;bottom:12px;left:12px;background:rgba(255,255,255,.97);border:1px solid var(--border);border-radius:var(--r);padding:7px 10px;display:none;align-items:center;gap:8px;z-index:15;backdrop-filter:blur(12px);box-shadow:0 2px 12px rgba(0,0,0,.08)}
.gd-lbl{font-size:11px;color:var(--text3);font-weight:500}
.gd-val{font-size:13px;font-family:'DM Mono',monospace;color:var(--text);min-width:36px;text-align:center}
.gd-sep{width:1px;height:16px;background:var(--border);flex-shrink:0}

/* SEEKBAR */
.seekbar-wrap{background:var(--surface);border-top:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.seekbar{flex:1;height:3px;background:var(--surface3);border-radius:2px;cursor:pointer;position:relative;transition:height .15s}
.seekbar:hover{height:5px}
.sb-fill{height:100%;background:var(--accent);border-radius:2px;pointer-events:none;transition:width .08s}
.pdf-mk{position:absolute;top:-2px;height:7px;border-radius:2px;opacity:.45;pointer-events:none}
.t-lbl{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;white-space:nowrap;min-width:34px}
.t-lbl.r{text-align:right}

/* INFO PANEL */
.info-panel{flex:1;background:var(--surface);border-top:1px solid var(--border);overflow-y:auto;min-height:0}
.info-panel::-webkit-scrollbar{width:0}.info-panel:hover::-webkit-scrollbar{width:4px}
.info-panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.tabs{display:flex;padding:0 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:5}
.tab{padding:10px 12px;font-size:13px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:color .12s,border-color .12s;user-select:none;font-weight:500}
.tab:hover{color:var(--text2)}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.pane{display:none;padding:16px 18px}.pane.active{display:block}
.info-tit{font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px;letter-spacing:-.2px}
.info-meta{font-size:12px;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;flex-wrap:wrap}
.dur-pill{background:var(--surface2);border:1px solid var(--border);padding:2px 8px;border-radius:4px;font-size:11px;color:var(--text2)}
.info-desc{font-size:13px;color:var(--text2);line-height:1.7}

/* PDF LIST */
.pdf-list{display:flex;flex-direction:column;gap:6px}
.pdf-card{display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;cursor:pointer;transition:border-color .12s,background .12s}
.pdf-card:hover{border-color:var(--accent);background:var(--accent-bg)}
.pc-ico{width:32px;height:32px;background:var(--surface3);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--text3);flex-shrink:0;transition:background .12s,color .12s}
.pdf-card:hover .pc-ico{background:var(--accent-bg);color:var(--accent)}
.pc-body{flex:1;min-width:0}
.pc-name{font-size:13px;font-weight:500;color:var(--text)}
.pc-meta{font-size:11px;color:var(--text3);margin-top:2px}
.pc-range{font-size:10px;font-family:'DM Mono',monospace;color:var(--text2);background:var(--surface3);border:1px solid var(--border);padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.gd-notice{background:var(--accent-bg);border:1px solid #c7d9fd;border-radius:var(--r);padding:10px 13px;font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:8px}
.gd-notice b{color:var(--accent);font-weight:600}

/* NOTES */
.notes-area{width:100%;min-height:90px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:11px 12px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;resize:vertical;line-height:1.6;transition:border-color .15s}
.notes-area:focus{border-color:var(--accent);background:var(--surface)}
.notes-area::placeholder{color:var(--text3)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:420px;max-width:92vw;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.12);animation:mIn .16s ease}
@keyframes mIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.mo-hd{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.mo-tit{font-size:14px;font-weight:600;flex:1}
.mo-body{padding:16px 18px}
.mo-path{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:9px 12px;font-size:12px;color:var(--accent);font-family:'DM Mono',monospace;word-break:break-all;margin-bottom:14px}
.mo-act{display:flex;gap:8px;justify-content:flex-end}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--text);color:#fff;border-radius:8px;padding:9px 16px;font-size:13px;z-index:9999;transition:transform .22s ease;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* LOADING */
.lbar{height:2px;background:var(--accent);position:fixed;top:0;left:0;z-index:9999;transition:width .3s ease;width:0}
</style>
</head>
<body>
<div class="lbar" id="lbar"></div>

<div class="topbar">
  <div class="t-logo">edu<span>PLAY</span></div>
  <div class="t-div"></div>
  <div class="t-title" id="topTitle">강의를 선택하세요</div>
  <button class="btn btn-done" id="watchedBtn" style="display:none" onclick="markWatched()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>완료
  </button>
  <button class="btn-ico" onclick="toggleSidebar()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <button class="btn-ico" onclick="window.open('/admin.html','_blank')">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3m-3.2-6.8-2.1 2.1M7.3 16.7l-2.1 2.1m0-14.2 2.1 2.1M16.7 16.7l2.1 2.1"/></svg>
  </button>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sb-top">
      <div class="sb-lbl">강의 목록</div>
      <div class="sb-search">
        <span class="sb-si"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input type="text" placeholder="검색" id="searchInput" oninput="filterTree(this.value)">
      </div>
    </div>
    <div class="sb-cnt" id="totalCount"></div>
    <div class="tree" id="treeRoot"></div>
  </div>

  <div class="content">
    <div class="vid-wrap" id="vidWrap">
      <div class="vid-empty" id="vidEmpty">
        <div class="ve-ico"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width=".8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg></div>
        <div class="ve-txt">강의를 선택해 재생하세요</div>
      </div>
      <video id="mainVideo" style="display:none" controls></video>
      <iframe id="gdFrame" allowfullscreen allow="autoplay"></iframe>

      <div class="gd-badge" id="gdBadge">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        Google Drive
      </div>

      <div class="gd-timer" id="gdTimer">
        <span class="gd-lbl">타이머</span>
        <span class="gd-val" id="gdVal">0:00</span>
        <div class="gd-sep"></div>
        <button class="btn-ico" id="gdBtn" onclick="toggleGdTimer()">
          <svg id="gdIco" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
        <button class="btn-ico" onclick="resetGdTimer()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
        </button>
      </div>

      <div class="pdf-overlay" id="pdfOverlay"></div>
    </div>

    <div class="seekbar-wrap" id="seekbarWrap" style="display:none">
      <span class="t-lbl" id="timeCur">0:00</span>
      <div class="seekbar" id="seekbar" onclick="seekClick(event)">
        <div class="sb-fill" id="sbFill" style="width:0%"></div>
        <div id="pdfMk"></div>
      </div>
      <span class="t-lbl r" id="timeTot">0:00</span>
    </div>

    <div class="info-panel">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('info',this)">정보</div>
        <div class="tab" onclick="switchTab('pdfs',this)">자료</div>
        <div class="tab" onclick="switchTab('notes',this)">메모</div>
      </div>
      <div class="pane active" id="tab-info">
        <div class="info-tit" id="infoTit">강의를 선택하세요</div>
        <div class="info-meta" id="infoMeta"></div>
        <div class="info-desc" id="infoDesc"></div>
      </div>
      <div class="pane" id="tab-pdfs">
        <div class="pdf-list" id="pdfList"><div style="font-size:13px;color:var(--text3);text-align:center;padding:28px 0">강의를 선택하면 자료가 표시됩니다</div></div>
      </div>
      <div class="pane" id="tab-notes">
        <textarea class="notes-area" id="notesArea" placeholder="메모를 남겨보세요"></textarea>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="pdfModal" onclick="if(event.target===this)closeMo()">
  <div class="modal">
    <div class="mo-hd">
      <div class="mo-tit" id="mTit">자료 파일</div>
      <button class="btn-ico" onclick="closeMo()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="mo-body">
      <div style="font-size:12px;color:var(--text3);margin-bottom:8px" id="mSub"></div>
      <div class="mo-path" id="mPath"></div>
      <div class="mo-act">
        <button class="btn btn-ghost" onclick="closeMo()">취소</button>
        <button class="btn btn-solid" onclick="doOpen()">열기</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WK='eduplay_watched', NK='eduplay_notes';
let data=[], watched=new Set(), notes={}, cur=null, activePdf=null, sbOpen=true, evts=[];

const ICO = {
  chv:`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`,
  file:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>`,
};

async function loadData(){
  bar(30);
  try{data=await fetch('/api/courses').then(r=>r.json());}catch{data=[];toast('서버 연결 실패');}
  try{watched=new Set(JSON.parse(localStorage.getItem(WK)||'[]'));}catch{}
  try{notes=JSON.parse(localStorage.getItem(NK)||'{}');}catch{}
  bar(100); buildTree(data); setTimeout(()=>bar(0),400);
}
setInterval(async()=>{const f=await fetch('/api/courses').then(r=>r.json()).catch(()=>null);if(f){data=f;buildTree(f);}},15000);
function bar(p){document.getElementById('lbar').style.width=p+'%';}

function buildTree(src){
  const root=document.getElementById('treeRoot'); root.innerHTML='';
  if(!src.length){root.innerHTML=`<div style="padding:20px 16px;font-size:13px;color:var(--text3)">강의가 없습니다</div>`;return;}
  const tot=src.reduce((a,c)=>a+c.subcategories.reduce((b,s)=>b+s.videos.length,0),0);
  document.getElementById('totalCount').textContent=tot+'개';
  src.forEach(c=>root.appendChild(mkCat(c)));
  if(cur) document.getElementById('vi-'+cur.id)?.classList.add('active');
}
function mkCat(cat){
  const tot=cat.subcategories.reduce((a,s)=>a+s.videos.length,0);
  const d=document.createElement('div'); d.className='t-cat open';
  d.innerHTML=`<div class="t-cat-hd" onclick="this.parentElement.classList.toggle('open')">
    <span class="t-chv">${ICO.chv}</span>
    <span class="t-cat-num" style="background:${cat.color}18;color:${cat.color}">${(cat.label.match(/\d+/)||['·'])[0]}</span>
    <span class="t-cat-lbl">${cat.label}</span>
    <span class="t-bdg">${tot}</span>
  </div><div class="t-cat-body"></div>`;
  cat.subcategories.forEach(s=>d.querySelector('.t-cat-body').appendChild(mkSub(s)));
  return d;
}
function mkSub(sub){
  const d=document.createElement('div'); d.className='t-sub open';
  d.innerHTML=`<div class="t-sub-hd" onclick="this.parentElement.classList.toggle('open')">
    <span class="t-chv">${ICO.chv}</span>
    <span class="t-sub-lbl">${sub.label}</span>
    <span class="t-bdg">${sub.videos.length}</span>
  </div><div class="t-sub-body"></div>`;
  sub.videos.forEach(v=>d.querySelector('.t-sub-body').appendChild(mkVid(v)));
  return d;
}
function mkVid(vid){
  const el=document.createElement('div');
  el.className='t-vid'+(watched.has(vid.id)?' watched':''); el.id='vi-'+vid.id;
  const pc=(vid.pdfs||[]).length;
  el.innerHTML=`<div class="t-ind"></div>
    <div class="t-vid-inf">
      <div class="t-vid-tit">${vid.title}</div>
      <div class="t-vid-meta" id="vm-${vid.id}">${pc?pc+'개 자료':''}</div>
    </div>`;
  el.onclick=()=>playVideo(vid); return el;
}

// GD
function isGD(u){return u&&u.includes('drive.google.com');}
function toEmbed(u){
  let m=u.match(/\/file\/d\/([^\/\?&]+)/);if(m)return`https://drive.google.com/file/d/${m[1]}/preview`;
  m=u.match(/[?&]id=([^&]+)/);if(m)return`https://drive.google.com/file/d/${m[1]}/preview`;
  return u.includes('/preview')?u:u;
}
let gdSec=0,gdRun=false,gdInt=null;
function startGd(){if(gdRun)return;gdRun=true;document.getElementById('gdIco').innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';gdInt=setInterval(()=>{gdSec++;document.getElementById('gdVal').textContent=fmt(gdSec);updOverlay(null,gdSec);},1000);}
function pauseGd(){gdRun=false;clearInterval(gdInt);document.getElementById('gdIco').innerHTML='<polygon points="5 3 19 12 5 21 5 3"/>';}
function toggleGdTimer(){gdRun?pauseGd():startGd();}
function resetGdTimer(){pauseGd();gdSec=0;document.getElementById('gdVal').textContent='0:00';document.getElementById('pdfOverlay').innerHTML='';if(cur)setupGdOverlay(cur);}
function stopGd(){pauseGd();gdSec=0;}

function playVideo(vid){
  if(cur) saveNotes(); cur=vid;
  document.querySelectorAll('.t-vid').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('vi-'+vid.id);
  if(el){el.classList.add('active');el.scrollIntoView({block:'nearest',behavior:'smooth'});}
  document.getElementById('topTitle').innerHTML=`<b>${vid.title}</b>`;
  document.getElementById('watchedBtn').style.display='';
  const video=document.getElementById('mainVideo'), iframe=document.getElementById('gdFrame'),
        empty=document.getElementById('vidEmpty'), badge=document.getElementById('gdBadge'),
        timer=document.getElementById('gdTimer'), sw=document.getElementById('seekbarWrap');
  video.pause();video.removeAttribute('src');video.style.display='none';
  iframe.src='about:blank';iframe.style.display='none';
  empty.style.display='none';badge.style.display='none';timer.style.display='none';sw.style.display='none';
  stopGd();clearEvts();document.getElementById('pdfOverlay').innerHTML='';

  if(!vid.src){
    empty.style.display='flex';
    empty.innerHTML=`<div class="ve-ico"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width=".8" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="2"/><polyline points="9 10 5 10 5 20 19 20 19 10 15 10"/></svg></div><div class="ve-txt">영상 경로를 설정해주세요</div>`;
  } else if(isGD(vid.src)){
    iframe.src=toEmbed(vid.src);iframe.style.display='block';badge.style.display='flex';
    if((vid.pdfs||[]).some(p=>p.showFrom!==''&&p.showFrom!=null))timer.style.display='flex';
    setupGdOverlay(vid);
  } else {
    video.src=vid.src;video.style.display='block';video.load();video.play().catch(()=>{});
    sw.style.display='flex';setupVidEvts(vid);
  }
  document.getElementById('infoTit').textContent=vid.title;
  updMeta(vid,null);document.getElementById('infoDesc').textContent=vid.desc||'';
  renderPdfs(vid);document.getElementById('notesArea').value=notes[vid.id]||'';
}

function setupGdOverlay(vid){
  const ov=document.getElementById('pdfOverlay');ov.innerHTML='';
  (vid.pdfs||[]).forEach(p=>{const hr=(p.showFrom!==''&&p.showFrom!=null)||(p.showUntil!==''&&p.showUntil!=null);if(!hr)ov.appendChild(mkPdfBtn(p,true));});
}

function setupVidEvts(vid){
  const v=document.getElementById('mainVideo');
  const onM=()=>{
    const d=v.duration,f=fmt(d);updMeta(vid,f);document.getElementById('timeTot').textContent=f;
    const vm=document.getElementById('vm-'+vid.id);if(vm){const pc=(vid.pdfs||[]).length;vm.textContent=f+(pc?' · '+pc+'개 자료':'');}
    renderMk(vid,d);
  };
  const onT=()=>{if(!v.duration)return;const p=v.currentTime/v.duration*100;document.getElementById('sbFill').style.width=p+'%';document.getElementById('timeCur').textContent=fmt(v.currentTime);updOverlay(vid,v.currentTime);};
  const onE=()=>markWatched();
  v.addEventListener('loadedmetadata',onM);v.addEventListener('timeupdate',onT);v.addEventListener('ended',onE);
  evts.push(()=>v.removeEventListener('loadedmetadata',onM),()=>v.removeEventListener('timeupdate',onT),()=>v.removeEventListener('ended',onE));
  if(v.readyState>=1&&v.duration) onM();
}
function clearEvts(){evts.forEach(f=>f());evts=[];}

function updMeta(vid,dur){
  const pc=(vid.pdfs||[]).length,meta=document.getElementById('infoMeta');
  const d=dur?`<span class="dur-pill">${dur}</span>`:'';
  const p=pc?`<span>${pc}개 자료</span>`:'';
  meta.innerHTML=[d,p].filter(Boolean).join('<span style="color:var(--border2)"> · </span>')||`<span style="color:var(--text3);font-size:13px;font-family:inherit">재생하면 정보가 표시됩니다</span>`;
}

function updOverlay(vid,t){
  const target=vid||cur;if(!target)return;
  const ov=document.getElementById('pdfOverlay'),pdfs=target.pdfs||[];
  const vis=pdfs.filter(p=>{
    const f=(p.showFrom!==''&&p.showFrom!=null)?Number(p.showFrom):null;
    const u=(p.showUntil!==''&&p.showUntil!=null)?Number(p.showUntil):null;
    return(f===null||t>=f)&&(u===null||t<=u);
  });
  const curIds=[...ov.querySelectorAll('.pdf-btn')].map(b=>b.dataset.id).join(',');
  const newIds=vis.map(p=>p.id||p.path).join(',');
  if(curIds===newIds)return;
  ov.innerHTML='';vis.forEach(p=>ov.appendChild(mkPdfBtn(p,true)));
}

function mkPdfBtn(pdf,live){
  const btn=document.createElement('div');btn.className='pdf-btn';btn.dataset.id=pdf.id||pdf.path;
  if(!live)btn.style.opacity='.3';
  const f=pdf.showFrom!=null&&pdf.showFrom!==''?fmt(Number(pdf.showFrom)):'–';
  const u=pdf.showUntil!=null&&pdf.showUntil!==''?fmt(Number(pdf.showUntil)):'–';
  btn.innerHTML=`<div class="pb-ico">${ICO.file}</div>
    <div><div class="pb-name">${pdf.name||'자료'}</div><div class="pb-lbl">${pdf.label||(f!=='–'?f+' ~ '+u:'항상 표시')}</div></div>`;
  btn.onclick=()=>openMo(pdf);return btn;
}

function renderMk(vid,dur){
  const c=document.getElementById('pdfMk');c.innerHTML='';
  const C=['#2060e8','#16a34a','#d97706','#dc2626','#7c3aed'];
  (vid.pdfs||[]).forEach((p,i)=>{
    const f=(p.showFrom!=null&&p.showFrom!=='')?Number(p.showFrom):0;
    const u=(p.showUntil!=null&&p.showUntil!=='')?Number(p.showUntil):dur;
    if(f>=u||f>dur)return;
    const m=document.createElement('div');m.className='pdf-mk';
    m.style.left=(f/dur*100).toFixed(2)+'%';m.style.width=((Math.min(u,dur)-f)/dur*100).toFixed(2)+'%';
    m.style.background=C[i%C.length];m.title=`${p.name}: ${fmt(f)} ~ ${fmt(u)}`;c.appendChild(m);
  });
}

function renderPdfs(vid){
  const el=document.getElementById('pdfList'),pdfs=vid.pdfs||[];
  let h='';
  if(isGD(vid.src||'')&&pdfs.some(p=>p.showFrom!==''&&p.showFrom!=null))
    h=`<div class="gd-notice">Google Drive 모드 — 영상 재생 후 화면 위 <b>타이머를 시작</b>하면 설정된 구간에서 자료 버튼이 표시됩니다.</div>`;
  if(!pdfs.length){el.innerHTML=h+'<div style="font-size:13px;color:var(--text3);text-align:center;padding:24px 0">첨부 자료가 없습니다</div>';return;}
  el.innerHTML=h;
  pdfs.forEach(p=>{
    const f=(p.showFrom!=null&&p.showFrom!=='')?fmt(Number(p.showFrom)):'시작';
    const u=(p.showUntil!=null&&p.showUntil!=='')?fmt(Number(p.showUntil)):'끝';
    const c=document.createElement('div');c.className='pdf-card';
    c.innerHTML=`<div class="pc-ico">${ICO.file}</div>
      <div class="pc-body"><div class="pc-name">${p.name||'파일'}</div><div class="pc-meta">${p.label||p.path||''}</div></div>
      <div class="pc-range">${f} ~ ${u}</div>`;
    c.onclick=()=>openMo(p);el.appendChild(c);
  });
}

const vidEl=document.getElementById('mainVideo');
function seekClick(e){if(!vidEl.duration)return;vidEl.currentTime=(e.offsetX/e.currentTarget.offsetWidth)*vidEl.duration;}

function openMo(pdf){activePdf=pdf;document.getElementById('mTit').textContent=pdf.name||'파일';document.getElementById('mSub').textContent=pdf.label||'강의 자료';document.getElementById('mPath').textContent=pdf.path||'경로 없음';document.getElementById('pdfModal').classList.add('open');}
function closeMo(){document.getElementById('pdfModal').classList.remove('open');}
function doOpen(){if(!activePdf?.path){toast('파일 경로가 없습니다');return;}closeMo();window.open(activePdf.path,'_blank');toast('파일을 열었습니다');}

function toggleSidebar(){sbOpen=!sbOpen;document.getElementById('sidebar').classList.toggle('collapsed',!sbOpen);}
function switchTab(id,el){document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('tab-'+id).classList.add('active');if(el)el.classList.add('active');}
function markWatched(){if(!cur)return;watched.add(cur.id);localStorage.setItem(WK,JSON.stringify([...watched]));document.getElementById('vi-'+cur.id)?.classList.add('watched');toast('학습 완료로 표시했습니다');}
function saveNotes(){if(!cur)return;notes[cur.id]=document.getElementById('notesArea').value;localStorage.setItem(NK,JSON.stringify(notes));}
document.getElementById('notesArea').addEventListener('input',saveNotes);

function filterTree(q){q=q.toLowerCase().trim();if(!q){buildTree(data);return;}const f=data.map(c=>({...c,subcategories:c.subcategories.map(s=>({...s,videos:s.videos.filter(v=>v.title.toLowerCase().includes(q))})).filter(s=>s.videos.length)})).filter(c=>c.subcategories.length);buildTree(f);document.querySelectorAll('.t-cat,.t-sub').forEach(n=>n.classList.add('open'));}

function fmt(s){s=Math.floor(s||0);const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),r=s%60;return h?`${h}:${p2(m)}:${p2(r)}`:`${m}:${p2(r)}`;}
function p2(n){return String(n).padStart(2,'0');}
let _t;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(_t);_t=setTimeout(()=>t.classList.remove('show'),2200);}

loadData();
</script>
